name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"          

      - run: pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin  pymdown-extensions

      - run: mkdocs gh-deploy --force



